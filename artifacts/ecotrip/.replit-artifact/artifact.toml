kind = "web"
previewPath = "/"
title = "EcoTrip Arboretum"
version = "1.0.0"
id = "artifacts/ecotrip"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20997

[services.development]
run = "pnpm --filter @workspace/ecotrip run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecotrip", "run", "build" ]
publicDir = "artifacts/ecotrip/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20997"
BASE_PATH = "/"
